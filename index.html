<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINE EL LORA TV</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #121212; 
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        .header-container { 
            position: sticky; 
            top: 0; 
            background: #1a1a1a; 
            padding: 10px; 
            z-index: 9999; 
            border-bottom: 1px solid #333; 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 { 
            color: #ff9800; 
            margin: 0 0 8px 0; 
            font-size: 1rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-wrapper {
            display: flex;
            gap: 10px;
            width: 80%; /* Ajustado para que no se salga */
            max-width: 400px; /* Ajustado para que no se salga */
            justify-content: center;
        }

        #buscador {
            flex-grow: 1;
            padding: 8px 15px; 
            border-radius: 20px; 
            border: 1px solid #ff9800;
            background: #222; 
            color: white; 
            font-size: 0.9rem; 
            outline: none;
            min-width: 0; /* Asegura que respete el contenedor */
        }

        /* BOTÓN REFRESCAR */
        .btn-refresh {
            background-color: #ff9800;
            color: black;
            border: none;
            border-radius: 20px;
            padding: 8px 15px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }

        #buscador:focus, .btn-wise:focus, .btn-refresh:focus {
            background-color: #ffffff !important;
            color: #000000 !important;
            border-color: #ffffff !important;
            transform: scale(1.02);
            outline: none !important;
        }

        .grid-container {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px; 
            padding: 15px;
            max-width: 1200px; 
            margin: 0 auto;
        }

        .btn-wise {
            background-color: #1e1e1e; 
            color: white; 
            padding: 15px; 
            text-decoration: none;
            border-radius: 8px; 
            font-weight: bold; 
            border: 1px solid #333;
            display: block; 
            text-align: left;
            outline: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-container">
        <h2>🇪🇸🇪🇸-CINE EL LORA-🇪🇸🇪🇸</h2>
        <div class="search-wrapper">
            <input type="text" id="buscador" class="nav" placeholder="BUSCAR VIDEO..." onkeyup="filtrar()">
            <button class="btn-refresh nav" onclick="resetear()">REFRESCAR</button>
        </div>
    </div>

    <div class="grid-container" id="contenedor">
        <a class="btn-wise nav" tabindex="0" href="intent://abstream.to/e/jdrs06p22yu3#Intent;scheme=http;action=android.intent.action.VIEW;type=video/*;package=com.wiseplay;S.android.intent.extra.TITLE=Afterburn;end">AFTERBURN</a>
        <a class="btn-wise nav" tabindex="0" href="intent://abstream.to/e/yvqt8sj2bjbb#Intent;scheme=http;action=android.intent.action.VIEW;type=video/*;package=com.wiseplay;S.android.intent.extra.TITLE=Acosada;end">ACOSADA</a>
        <a class="btn-wise nav" tabindex="0" href="intent://abstream.to/e/f77o3qjsmvjw#Intent;scheme=http;action=android.intent.action.VIEW;type=video/*;package=com.wiseplay;S.android.intent.extra.TITLE=La sospecha de Sofia;end">LA SOSPECHA DE SOFIA</a>
        <a class="btn-wise nav" tabindex="0" href="intent://abstream.to/e/r48kcvgga5c1#Intent;scheme=http;action=android.intent.action.VIEW;type=video/*;package=com.wiseplay;S.android.intent.extra.TITLE=Los Muertimer;end">LOS MUERTIMER</a>
        <a class="btn-wise nav" tabindex="0" href="intent://://luluvid.com">PREDATORS</a>
        <a class="btn-wise nav" tabindex="0" href="acestream://bef475d914b1d5c97c02c046b8dade97ffd87ce6">ZONA DE CAZA</a>
        <a class="btn-wise nav" tabindex="0" href="acestream://3c9c31ae11f43751d9a36258d8d152b2890e137d">VIEJA LOCA</a>
    </div>

    <script>
        const navItems = document.getElementsByClassName('nav');

        document.addEventListener('keydown', function(e) {
            let current = document.activeElement;
            let items = Array.from(navItems).filter(i => i.offsetParent !== null);
            let index = items.indexOf(current);

            if (index === -1) { items[0].focus(); return; }

            let target = index;
            let grid = document.getElementById('contenedor');
            let cols = window.getComputedStyle(grid).getPropertyValue("grid-template-columns").split(" ").length;

            if (e.keyCode === 39) target = index + 1; // DERECHA
            else if (e.keyCode === 37) target = index - 1; // IZQUIERDA
            else if (e.keyCode === 40) { // ABAJO
                if (index === 0 || index === 1) target = 2; // Del buscador/refrescar a los videos
                else target = index + cols;
            }
            else if (e.keyCode === 38) { // ARRIBA
                if (index < 2 + cols && index >= 2) target = 0; // De la primera fila al buscador
                else if (index >= 2) target = index - cols;
            }
            else if (e.keyCode === 13) { // ENTER
                current.click();
            }
            // ARREGLO PARA TECLA BORRAR (Backspace)
            else if (e.keyCode === 8 && current.id === "buscador") {
                // Permite que la tecla borrar funcione normalmente en el input
                return; 
            }

            if (items[target]) {
                items[target].focus();
                if (e.keyCode !== 8) e.preventDefault();
            }
        });

        function filtrar() {
            let q = document.getElementById('buscador').value.toUpperCase();
            let b = document.getElementsByClassName('btn-wise');
            for (let i = 0; i < b.length; i++) {
                let texto = b[i].innerText.toUpperCase();
                b[i].classList.toggle('hidden', texto.indexOf(q) === -1);
            }
        }

        function resetear() {
            document.getElementById('buscador').value = "";
            filtrar();
            document.getElementById('buscador').focus();
        }

        window.onload = () => document.getElementById('buscador').focus();
    </script>
</body>
</html>
